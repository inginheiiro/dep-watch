# =============================================================================
# Known Licenses
# =============================================================================
# GitHub sometimes returns NOASSERTION for licenses it doesn't recognize.
# Add repos here with their actual license for correct risk classification.
#
# Risk levels:
#   0 = low    (MIT, Apache, BSD, PostgreSQL, MPL)
#   1 = medium (AGPL, GPL - copyleft)
#   2 = high   (BSL, SSPL, Elastic - not OSI approved)
# =============================================================================

known_licenses:
  postgres/postgres:
    license: PostgreSQL
    risk: 0
    risk_label: low
    note: BSD-like permissive license

  redis/redis:
    license: RSALv2/SSPL/AGPL-3.0
    risk: 1
    risk_label: medium
    note: Tri-license since v8, AGPL option is OSI approved

  valkey-io/valkey:
    license: BSD-3-Clause
    risk: 0
    risk_label: low
    note: Redis fork, fully permissive

  dragonflydb/dragonfly:
    license: BSL-1.1
    risk: 2
    risk_label: high
    note: Business Source License - restricts hosting, converts to Apache 2.0 in 2029

  rabbitmq/rabbitmq-server:
    license: MPL-2.0
    risk: 0
    risk_label: low
    note: Mozilla Public License

  projectlombok/lombok:
    license: MIT
    risk: 0
    risk_label: low
    note: MIT License

  microsoft/garnet:
    license: MIT
    risk: 0
    risk_label: low
    note: MIT License

# =============================================================================
# License Classifications (Reference)
# =============================================================================
# These are used for automatic classification when GitHub detects the license.
# You don't need to edit this unless adding new license types.

license_classifications:
  high_risk:
    - SSPL-1.0
    - BSL-1.1
    - BUSL-1.1
    - Elastic-2.0
    - Commons-Clause
    - RSALv2
    - RSAL
    - Confluent-Community
    - Timescale
    - MariaDB-BSL-1.1
    - PolyForm-Noncommercial-1.0.0
    - PolyForm-Shield-1.0.0

  medium_risk:
    - AGPL-3.0
    - AGPL-3.0-only
    - AGPL-3.0-or-later
    - GPL-3.0
    - GPL-3.0-only
    - GPL-3.0-or-later
    - GPL-2.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - EUPL-1.2
    - OSL-3.0
    - CDDL-1.0
    - EPL-2.0
    - EPL-1.0

  low_risk:
    - MIT
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - BSD-3-Clause-Clear
    - ISC
    - Unlicense
    - CC0-1.0
    - 0BSD
    - WTFPL
    - Zlib
    - PostgreSQL
    - MPL-2.0
    - LGPL-2.1
    - LGPL-3.0
    - Artistic-2.0
    - BSL-1.0
    - CC-BY-4.0
    - BlueOak-1.0.0

# =============================================================================
# Dependency Monitor - Projects Configuration
# =============================================================================
# Edit this file to add/remove projects to monitor.
# The collector will auto-detect: license, stars, forks, security score, etc.
#
# Format:
#   project_id:
#     github: owner/repo
#     libraries_io: platform/package (optional, for dependents count)
#     category: infrastructure|frontend|backend
#     ecosystem: npm|maven|pypi|go (for OSV vulnerability queries)
#     current_version: x.y.z (version you're using - for CVE detection)
#
# Known licenses (for repos GitHub doesn't detect correctly):
#   Add to 'known_licenses' section below
# =============================================================================

